<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Hero Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="bg-white">

    <main id="mainContainer" class="h-[200vh] bg-white text-black">
        <section id="hero">
            <img id="carFrame" src="public/cars/car_000.jpg" alt="frame animation" 
                 class="absolute top-0 left-0 w-full h-full object-cover z-[100]">
            <img id="bgCar" src="public/car.png" alt="top car" 
                 class="absolute w-[80vw] max-w-[600px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-[50] pointer-events-none">
            <div id="content" class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 z-[90]">
                <h1 class="text-xl sm:text-3xl md:text-5xl tracking-[0.2em] md:tracking-[0.3em] whitespace-nowrap text-white">
                    WELCOME ITZ FIZZ
                </h1>

                <div class="row justify-content-center mt-4 mt-md-5 g-4">
                    <div class="col-auto text-center">
                        <h2 class="display-6 fw-bold">95%</h2>
                        <p class="stat-label small">Performance</p>
                    </div>
                    <div class="col-auto text-center">
                        <h2 class="display-6 fw-bold">80%</h2>
                        <p class="stat-label small">Engagement</p>
                    </div>
                    <div class="col-auto text-center">
                        <h2 class="display-6 fw-bold">99%</h2>
                        <p class="stat-label small">Satisfaction</p>
                    </div>
                </div>
            </div>
            <img id="carFrame" src="public/cars/car_000.jpg" alt="frame animation" 
                 class="absolute top-0 left-0 w-full h-full object-cover z-40">
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
